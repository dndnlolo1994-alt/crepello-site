<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="8px base scale, 4px half-step" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 26px; display:flex; flex-direction:column; gap:10px; }
  .r { display:flex; align-items:center; gap:14px; }
  .bar { height: 14px; background: var(--accent); border-radius: 2px; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 130px; flex:none; }
</style></head>
<body>
  <div class="r"><span class="lab">--space-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="r"><span class="lab">--space-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="r"><span class="lab">--space-5 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="r"><span class="lab">--space-6 · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="r"><span class="lab">--space-8 · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="r"><span class="lab">--space-9 · 64</span><span class="bar" style="width:64px"></span></div>
  <div class="r"><span class="lab">--space-11 · 96</span><span class="bar" style="width:96px"></span></div>
</body></html>
