<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 30px; display:flex; gap: 40px; align-items:center; flex-wrap:wrap; }
  .mark { font-family: var(--font-display); color: var(--text-strong); font-size: 52px; font-weight: 500; letter-spacing: 0.01em; }
  .mark .dot { color: var(--accent); }
  .lockup { display:flex; flex-direction:column; gap: 4px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: .28em; text-transform:uppercase; color: var(--text-faint); padding-left:3px; }
  .onlight { background: var(--cream-50); padding: 18px 26px; border-radius: var(--radius-md); }
  .onlight .mark { color: var(--espresso-1000); }
</style></head>
<body>
  <div class="lockup">
    <span class="mark">Crepello<span class="dot">.</span></span>
    <span class="tag">Atelier · Amman</span>
  </div>
  <div class="onlight"><span class="mark">Crepello<span class="dot">.</span></span></div>
</body></html>
