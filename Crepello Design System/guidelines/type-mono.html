<!-- @dsCard group="Type" viewport="700x170" name="Mono Labels & Numerals" subtitle="Space Mono eyebrows + the 01–04 signature motif" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 28px; display:flex; flex-direction:column; gap: 20px; }
  .eyebrows { display:flex; gap: 28px; flex-wrap:wrap; }
  .nums { display:flex; gap: 26px; align-items:baseline; }
  .n { font-family: var(--font-mono); color: var(--accent); font-size: 40px; }
  .n span { color: var(--text-faint); font-size: 14px; margin-left: 8px; }
</style></head>
<body>
  <div class="eyebrows">
    <span class="eyebrow">01 — DRINKS</span>
    <span class="eyebrow" style="color:var(--text-faint)">THE CRAFT</span>
    <span class="eyebrow" style="color:var(--text-muted)">SINCE AMMAN</span>
  </div>
  <div class="nums">
    <span class="n">01<span>Drinks</span></span>
    <span class="n">02<span>Dessert</span></span>
    <span class="n">03<span>Bakery</span></span>
    <span class="n">04<span>Brunch</span></span>
  </div>
</body></html>
