<!-- @dsCard group="Type" viewport="700x230" name="Arabic / RTL" subtitle="Amiri display + IBM Plex Sans Arabic body, mirrored" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 28px; }
  .eye { font-family: var(--font-mono); font-size: 12px; letter-spacing:.2em; color: var(--accent); margin-bottom: 12px; }
  .big { font-family: var(--font-ar-display); color: var(--text-strong); font-size: 52px; line-height: 1.2; }
  p { font-family: var(--font-ar-body); color: var(--text-body); font-size: 17px; line-height: 1.9; max-width: 52ch; margin-top: 14px; }
  .meta { margin-top: 14px; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); direction:ltr; text-align:right; }
</style></head>
<body>
  <div class="eye">٠١ — المشروبات</div>
  <div class="big">سيمفونية في كل رشفة</div>
  <p>قهوة محضّرة على مهل وشراب البيت، تُقدَّم كما أرادها مرسمنا — دافئة، أنيقة، ولذيذة.</p>
  <div class="meta">Amiri (display) + IBM Plex Sans Arabic (body)</div>
</body></html>
