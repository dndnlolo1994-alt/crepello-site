<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 28px; }
  .eye { margin-bottom: 14px; }
  .big { font-family: var(--font-display); color: var(--text-strong); font-size: 64px; line-height: 1.04; letter-spacing: var(--ls-display); font-weight: 500; }
  .big em { font-style: italic; color: var(--accent-soft); }
  .meta { margin-top: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style></head>
<body>
  <div class="eyebrow eye">THE ATELIER</div>
  <div class="big">A symphony <em>in every</em> sip.</div>
  <div class="meta">Bodoni Moda · 500 · letter-spacing −0.005em (never crammed)</div>
</body></html>
