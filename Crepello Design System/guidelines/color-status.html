<!-- @dsCard group="Colors" viewport="700x170" name="Borders & Status" subtitle="Hairline borders + the two warm support hues" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 24px; display:flex; gap: 30px; }
  .col { display:flex; flex-direction:column; gap:10px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing:.16em; text-transform:uppercase; color: var(--text-faint); }
  .borders { display:flex; gap:10px; }
  .bx { width: 78px; height: 56px; border-radius: var(--radius-md); background: var(--surface-card); display:flex; align-items:flex-end; padding:6px; font-family: var(--font-mono); font-size:9px; color: var(--text-faint); }
  .status { display:flex; gap:10px; }
  .chip { font-family: var(--font-body); font-size:12px; font-weight:600; padding:7px 14px; border-radius: var(--radius-sm); }
</style></head>
<body>
  <div class="col">
    <span class="label">Borders</span>
    <div class="borders">
      <div class="bx" style="border:1px solid var(--border-subtle)">subtle</div>
      <div class="bx" style="border:1px solid var(--border-default)">default</div>
      <div class="bx" style="border:1px solid var(--border-strong)">strong</div>
      <div class="bx" style="border:1px solid var(--border-accent)">accent</div>
    </div>
  </div>
  <div class="col">
    <span class="label">Support / status</span>
    <div class="status">
      <span class="chip" style="background:rgba(181,72,91,.16);color:var(--berry-500);border:1px solid rgba(181,72,91,.4)">Dessert</span>
      <span class="chip" style="background:rgba(110,115,80,.18);color:#aeb38a;border:1px solid rgba(110,115,80,.45)">Savory</span>
    </div>
  </div>
</body></html>
