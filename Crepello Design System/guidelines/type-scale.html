<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 26px; }
  .r { display:flex; align-items:baseline; gap:18px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .s { font-family: var(--font-display); color: var(--text-strong); line-height:1.05; letter-spacing: var(--ls-display); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t { margin-left:auto; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); flex:none; }
</style></head>
<body>
  <div class="r"><span class="s" style="font-size:var(--text-4xl)">Crepello</span><span class="t">4xl · hero</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-3xl)">Crepello</span><span class="t">3xl · display</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-2xl)">Crepello</span><span class="t">2xl · h1</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-xl)">Crepello atelier</span><span class="t">xl · h3</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-lg);font-family:var(--font-body)">Crepello atelier café</span><span class="t">lg · lead</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-base);font-family:var(--font-body);color:var(--text-body)">Crepello atelier café — body</span><span class="t">base · 16</span></div>
</body></html>
