<!-- @dsCard group="Brand" viewport="700x230" name="Image Treatment" subtitle="Full-bleed warm imagery + protection gradient + duotone" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 22px; display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .frame { position: relative; height: 184px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle);
           /* placeholder food tone — warm espresso→caramel; swap for real photo */
           background: radial-gradient(120% 90% at 70% 20%, #5a3a1f 0%, #2a1c10 45%, #0b0807 100%); }
  .overlay::after { content:""; position:absolute; inset:0; background: var(--img-overlay); }
  .duo::after { content:""; position:absolute; inset:0; background: var(--img-duotone); mix-blend-mode: multiply; }
  .cap { position:absolute; left:14px; bottom:12px; z-index:2; }
  .cap .eye { font-family: var(--font-mono); font-size:10px; letter-spacing:.2em; color: var(--accent-soft); }
  .cap .t { font-family: var(--font-display); color: var(--text-strong); font-size: 19px; margin-top:2px; }
  .tag { position:absolute; top:12px; left:12px; z-index:2; font-family: var(--font-mono); font-size:10px; letter-spacing:.16em; color: var(--text-muted); background: var(--scrim); padding:4px 8px; border-radius: var(--radius-sm); }
</style></head>
<body>
  <div class="frame"><span class="tag">RAW</span></div>
  <div class="frame overlay"><span class="tag">+ OVERLAY</span><div class="cap"><div class="eye">02 — DESSERT</div><div class="t">Toasted caramel</div></div></div>
  <div class="frame overlay duo"><span class="tag">+ DUOTONE</span><div class="cap"><div class="eye">01 — DRINKS</div><div class="t">Slow coffee</div></div></div>
</body></html>
